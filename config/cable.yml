development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: forumforge_development

test:
  # `async` keeps pub/sub in-process, which is what Capybara's same-process
  # Puma server needs for Turbo Stream broadcasts to reach the browser during
  # JS system specs. (`test` would only buffer them.)
  adapter: async

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: forumforge_production
