# Omakase Ruby styling for Rails, with a few project-specific relaxations.
inherit_gem:
  rubocop-rails-omakase: rubocop.yml

AllCops:
  NewCops: disable
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "db/migrate/*.rb"
    - "vendor/**/*"
    - "node_modules/**/*"
    - "spec/**/*"
    - "config/**/*"
    # Operational rake tasks (scripts, heavy on puts / long-running loops).
    - "lib/tasks/**/*"

# The reputation SQL scope is intentionally one line.
Layout/LineLength:
  Max: 160
